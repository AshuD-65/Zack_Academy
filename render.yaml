services:
  - type: web
    name: student-registration-project
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn student_registration.wsgi:application"
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: student-registration-db
          property: connectionString

databases:
  - name: student-registration-db
    plan: free
