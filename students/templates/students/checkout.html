{% extends 'base.html' %}
{% load static %}

{% block title %}Checkout - Zack Academy{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md mx-auto">
        <div class="card">
            <div class="text-center mb-6">
                <h1 class="text-2xl font-bold text-gray-900 mb-2">Checkout</h1>
                <p class="text-gray-600">Complete your course enrollment</p>
            </div>

            <form method="post" action="{% url 'payment_create_session' %}" class="space-y-6">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Amount (USD)</label>
                    <input type="text" value="{{ amount_dollars }}" readonly
                           class="input-field bg-gray-50 cursor-not-allowed" />
                    <input type="hidden" name="amount_dollars" value="{{ amount_dollars }}" />
                    <input type="hidden" name="course_code" value="{{ course_code }}" />
                </div>

                <p class="text-sm text-gray-600">
                    You will be redirected to Stripe's secure payment page to enter your card details.
                </p>

                <button type="submit" class="btn-primary w-full py-3 text-lg">
                    Proceed to Payment
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="{% url 'course_list' %}" class="btn-outline text-sm">
                    ← Back to Courses
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
