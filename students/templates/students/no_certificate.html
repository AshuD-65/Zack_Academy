{% extends 'base.html' %}

{% block title %}No Certificate - Zack Academy{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="card text-center">
        <div class="flex justify-center mb-6">
            <div class="w-24 h-24 bg-yellow-100 rounded-full flex items-center justify-center">
                <svg class="w-12 h-12 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
        </div>
        <h1 class="text-3xl font-bold text-gray-900 mb-4">No Certificate Available</h1>
        <p class="text-gray-600 mb-8">{{ message|default:"You need to complete at least one course to receive a certificate." }}</p>
        <div class="space-x-4">
            <a href="{% url 'course_list' %}" class="btn-primary">
                Browse Courses
            </a>
            <a href="{% url 'dashboard' %}" class="btn-outline">
                Back to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
