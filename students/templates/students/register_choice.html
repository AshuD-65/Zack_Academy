{% extends 'base.html' %}

{% block title %}Register - Zack Academy{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8">
        <div>
            <div class="flex justify-center">
                <div class="w-16 h-16 bg-gradient-to-br from-primary-600 to-secondary-600 rounded-xl flex items-center justify-center">
                    <span class="text-white font-bold text-2xl">Z</span>
                </div>
            </div>
            <h2 class="mt-6 text-center text-3xl font-bold text-gray-900">
                Choose account type
            </h2>
            <p class="mt-2 text-center text-sm text-gray-600">
                Already have an account?
                <a href="{% url 'login_student' %}" class="font-medium text-primary-600 hover:text-primary-500">
                    Sign in
                </a>
            </p>
        </div>

        <div class="card space-y-4">
            <button onclick="window.location.href='{% url 'student_register' %}'"
                    class="btn-primary w-full py-3 text-lg">
                Register as Student
            </button>
            <button onclick="window.location.href='{% url 'register_teacher' %}'"
                    class="btn-outline w-full py-3 text-lg">
                Register as Teacher
            </button>
        </div>
    </div>
</div>
{% endblock %}
