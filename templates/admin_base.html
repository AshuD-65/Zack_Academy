{% extends 'base.html' %}

{% block content %}
<div class="flex min-h-[calc(100vh-4rem)]">
    <aside class="w-64 flex-shrink-0 border-r border-gray-200 bg-white text-gray-900 transition-colors duration-300">
        <div class="p-4 border-b border-gray-200">
            <p class="text-xs uppercase tracking-widest text-gray-500">Control Center</p>
            <h2 class="mt-1 font-bold text-gray-900">Admin Panel</h2>
        </div>
        <nav class="p-4 space-y-1">
            <a href="{% url 'admin_dashboard' %}" class="block rounded-md px-3 py-2 text-sm font-medium text-gray-700 transition-colors hover:bg-gray-100 hover:text-primary-600">Dashboard</a>
            <a href="{% url 'admin_all_students' %}" class="block rounded-md px-3 py-2 text-sm font-medium text-gray-700 transition-colors hover:bg-gray-100 hover:text-primary-600">Students</a>
            <a href="{% url 'admin_all_teachers' %}" class="block rounded-md px-3 py-2 text-sm font-medium text-gray-700 transition-colors hover:bg-gray-100 hover:text-primary-600">Teachers</a>
            <a href="{% url 'admin_all_courses' %}" class="block rounded-md px-3 py-2 text-sm font-medium text-gray-700 transition-colors hover:bg-gray-100 hover:text-primary-600">Courses</a>
            <a href="{% url 'admin_all_users' %}" class="block rounded-md px-3 py-2 text-sm font-medium text-gray-700 transition-colors hover:bg-gray-100 hover:text-primary-600">All Users</a>
            <a href="{% url 'admin_staff_ids' %}" class="block rounded-md px-3 py-2 text-sm font-medium text-gray-700 transition-colors hover:bg-gray-100 hover:text-primary-600">Staff IDs</a>
        </nav>
    </aside>
    <main class="flex-1 overflow-auto">
        {% block admin_content %}{% endblock %}
    </main>
</div>
{% endblock %}
