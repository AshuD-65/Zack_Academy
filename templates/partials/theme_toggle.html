<button
    type="button"
    class="theme-toggle"
    id="{{ toggle_id }}"
    data-theme="light"
    role="switch"
    aria-checked="false"
    aria-label="Toggle theme"
    title="Switch to dark mode">
    <span class="theme-toggle-track-icon theme-toggle-track-icon--sun" aria-hidden="true">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M12 3v2.25M12 18.75V21m8.25-9H18M6 12H3.75m14.084 6.334-1.591-1.59M7.757 7.757 6.166 6.166m11.668 0-1.591 1.591M7.757 16.243l-1.591 1.59M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
        </svg>
    </span>
    <span class="theme-toggle-track-icon theme-toggle-track-icon--moon" aria-hidden="true">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M21 12.79A9 9 0 1111.21 3c0 .32.02.64.05.95A7.5 7.5 0 0020.05 12c.31.03.63.05.95.05Z" />
        </svg>
    </span>
    <span class="theme-toggle-thumb" aria-hidden="true">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M12 3v2.25M12 18.75V21m8.25-9H18M6 12H3.75m14.084 6.334-1.591-1.59M7.757 7.757 6.166 6.166m11.668 0-1.591 1.591M7.757 16.243l-1.591 1.59M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
        </svg>
    </span>
</button>
